<svg width="1360" height="560" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SeismoWatch — Real-Time Earthquake Monitoring Dashboard</title>
<desc>A dark banner showing the SeismoWatch brand, a seismic waveform, globe with Philippines highlighted, and severity legend</desc>

<defs>
